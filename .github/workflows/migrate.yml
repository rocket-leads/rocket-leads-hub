name: Run Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and push migrations
        run: |
          supabase init --force
          supabase link --project-ref prvcgzrvmdwomwfvlpds --password "$SUPABASE_DB_PASSWORD"

          # 20240024 is in a corrupt half-state on the remote DB: supabase
          # reports it as missing without --include-all and as duplicate
          # WITH --include-all. Surgical reset: mark just that version as
          # REVERTED (deletes the half-row from schema_migrations), then
          # push --include-all to re-apply its idempotent SQL
          # (ADD COLUMN IF NOT EXISTS users.whatsapp_template_name) and
          # write a clean row.
          supabase migration repair --status reverted 20240024000000 --password "$SUPABASE_DB_PASSWORD" 2>/dev/null || true

          # --include-all is required because 20240024 has an out-of-order
          # timestamp (it was committed locally after later migrations had
          # already landed on remote). Once 20240024 is back in
          # schema_migrations, this flag becomes a no-op for future runs —
          # supabase only "includes all" migrations not yet recorded, and
          # everything else is a skip.
          supabase db push --include-all --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
