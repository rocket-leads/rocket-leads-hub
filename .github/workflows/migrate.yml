name: Run Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Reset stuck migration row + push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase init --force
          supabase link --project-ref prvcgzrvmdwomwfvlpds --password "$SUPABASE_DB_PASSWORD"

          # Direct SQL via psql to clear the stuck row. The Supabase CLI's
          # `migration repair --status reverted` silently no-ops when the
          # row doesn't match its internal expectations — that's how we
          # ended up cycling between two errors. A targeted DELETE on the
          # schema_migrations table is the only thing that reliably wipes
          # 20240024's corrupt entry. Idempotent: when the row is already
          # gone, the DELETE affects 0 rows.
          # GitHub Actions runners are IPv4-only and Supabase's direct DB
          # host (db.PROJECT.supabase.co) is IPv6-only. We must go through
          # the regional pooler. Try a few likely European regions; the
          # one that authenticates wins.
          PGUSER="postgres.prvcgzrvmdwomwfvlpds"
          for REGION in eu-west-1 eu-central-1 eu-central-2 eu-west-2 eu-north-1 us-east-1 us-west-1; do
            PGHOST="aws-0-${REGION}.pooler.supabase.com"
            echo "Trying $PGHOST..."
            if psql "host=$PGHOST port=6543 user=$PGUSER dbname=postgres sslmode=require connect_timeout=5" \
                 -c "DELETE FROM supabase_migrations.schema_migrations WHERE version = '20240024000000';" 2>&1 | tee /tmp/psql.out
            then
              if ! grep -q "Tenant or user not found\|connection to server" /tmp/psql.out; then
                echo "Connected via $REGION"
                break
              fi
            fi
          done

          # Push with --include-all so 20240024 (out-of-order timestamp)
          # gets re-applied. Its SQL is ADD COLUMN IF NOT EXISTS so a
          # re-apply is a no-op if the column is already there.
          supabase db push --include-all --password "$SUPABASE_DB_PASSWORD"
