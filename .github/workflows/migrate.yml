name: Run Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Find new migration files
        id: migrations
        run: |
          FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'supabase/migrations/*.sql' 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No new migrations found"
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found migrations:"
            echo "$FILES"
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Link Supabase project
        if: steps.migrations.outputs.has_migrations == 'true'
        run: |
          supabase init --force
          supabase link --project-ref prvcgzrvmdwomwfvlpds
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        if: steps.migrations.outputs.has_migrations == 'true'
        run: supabase db push --db-url "$DB_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
